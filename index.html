<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarun Tomar | Tech Portfolio</title>
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0f172a; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: #1e293b; padding: 3rem; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; max-width: 500px; border: 1px solid #334155; }
        h1 { margin: 0; font-size: 2.5rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; line-height: 1.6; margin: 1rem 0; }
        .badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 1.5rem; }
        .badge { background: #334155; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: var(--primary); }
        .btn { display: inline-block; margin-top: 2rem; padding: 12px 24px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-3px); }
        .footer-text { font-size: 0.75rem; color: #475569; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tarun Tomar</h1>
        <p>B.Tech Computer Science @ IILM University</p>
        <p>Blockchain Certified & Open Source Contributor</p>
        
        <div class="badges">
            <span class="badge">Blockchain+</span>
            <span class="badge">C Programming</span>
            <span class="badge">Web Development</span>
            <span class="badge">GSoC '26 Aspirant</span>
        </div>

        <a href="https://github.com/TarunWorks" class="btn">View My Projects</a>
        
        <div class="footer-text">
            Official Domain: <strong>taruntomar.tech</strong>
        </div>
    </div>
</body>
</html>
